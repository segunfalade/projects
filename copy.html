<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Copy Master Arena — Gamified Copywriting Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#2e1065,#0f172a,#000);color:#e2e8f0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:0 1rem}
.hdr{border-bottom:1px solid rgba(168,85,247,.3);background:rgba(15,23,42,.5);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;flex-wrap:wrap;gap:1rem}
.hdr h1{font-size:2rem;font-weight:800;background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:#94a3b8;font-size:.875rem}
.btn{padding:.5rem 1rem;border-radius:.5rem;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-size:.875rem}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-slate{background:#334155;color:#e2e8f0}.btn-slate:hover{background:#475569}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;padding:1.5rem 0}
@media(min-width:768px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{border-radius:.75rem;padding:1.25rem;border:1px solid rgba(168,85,247,.2)}
.stat-card.a{background:linear-gradient(135deg,#6d28d9,#7c3aed)}.stat-card.b{background:linear-gradient(135deg,#1d4ed8,#2563eb)}
.stat-card.c{background:linear-gradient(135deg,#b91c1c,#dc2626)}.stat-card.d{background:linear-gradient(135deg,#15803d,#16a34a)}
.stat-card .lbl{font-size:.75rem;font-weight:600;opacity:.8}.stat-card .val{font-size:2rem;font-weight:800;margin-top:.25rem}
.stat-card .prog{width:100%;height:.375rem;background:rgba(0,0,0,.3);border-radius:9999px;margin-top:.5rem;overflow:hidden}
.stat-card .prog-fill{height:100%;background:#fbbf24;border-radius:9999px;transition:width .5s}
.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.tab-btn{padding:.5rem 1rem;border-radius:.5rem;font-weight:600;border:none;cursor:pointer;font-size:.8rem;transition:all .2s;background:#1e293b;color:#cbd5e1}
.tab-btn:hover{background:#334155}
.tab-btn.active{background:#7c3aed;color:#fff}
.card{background:#1e293b;border-radius:.75rem;padding:1.25rem;border:1px solid rgba(168,85,247,.15);margin-bottom:1rem}
.card h3{font-size:1.25rem;font-weight:700;margin-bottom:.75rem}
.card p{color:#94a3b8;font-size:.875rem;line-height:1.5}
input,select,textarea{width:100%;padding:.625rem .75rem;background:#0f172a;border:1px solid #334155;border-radius:.5rem;color:#e2e8f0;font-size:.875rem;margin-bottom:.5rem;outline:none}
input:focus,select:focus,textarea:focus{border-color:#7c3aed}
.grid2{display:grid;grid-template-columns:1fr;gap:1rem}@media(min-width:768px){.grid2{grid-template-columns:1fr 1fr}}
.grid3{display:grid;grid-template-columns:1fr;gap:1rem}@media(min-width:768px){.grid3{grid-template-columns:1fr 1fr 1fr}}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.tag{padding:.25rem .5rem;border-radius:.25rem;font-size:.65rem;font-weight:700}
.status-not{background:rgba(100,116,139,.3);color:#94a3b8}
.status-prog{background:rgba(59,130,246,.3);color:#93c5fd}
.status-done{background:rgba(34,197,94,.3);color:#86efac}
.status-won{background:rgba(34,197,94,.3);color:#86efac}
.status-lost{background:rgba(239,68,68,.3);color:#fca5a5}
.xp-badge{font-size:.75rem;font-weight:700;color:#c084fc}
.heat-grid{display:flex;gap:2px;overflow-x:auto;padding:.5rem 0}
.heat-col{display:flex;flex-direction:column;gap:2px}
.heat-cell{width:14px;height:14px;border-radius:2px;cursor:pointer;transition:transform .15s}
.heat-cell:hover{transform:scale(1.3);z-index:2;box-shadow:0 0 6px rgba(255,255,255,.4)}
.heat-i0{background:#1e293b}.heat-i1{background:#14532d}.heat-i2{background:#166534}.heat-i3{background:#15803d}.heat-i4{background:#16a34a}.heat-i5{background:#22c55e}
.badge-unlocked{display:flex;flex-direction:column;align-items:center;padding:1rem;background:linear-gradient(135deg,#b45309,#d97706);border-radius:.75rem;border:2px solid #fcd34d;text-align:center;cursor:default;transition:transform .15s}
.badge-unlocked:hover{transform:scale(1.05)}
.badge-locked{display:flex;flex-direction:column;align-items:center;padding:1rem;background:#1e293b;border-radius:.75rem;border:1px solid #334155;text-align:center;opacity:.5;cursor:default}
.badge-ico{font-size:2.25rem;margin-bottom:.25rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#1e293b;border-radius:1rem;padding:1.5rem;border:1px solid rgba(168,85,247,.4);max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.level-bar{width:100%;height:.5rem;background:rgba(0,0,0,.3);border-radius:9999px;overflow:hidden;margin-top:.25rem}
.level-bar-fill{height:100%;background:linear-gradient(90deg,#c084fc,#f472b6);border-radius:9999px;transition:width .5s}
.toast{position:fixed;top:1rem;right:1rem;background:#1e293b;border:1px solid #7c3aed;border-radius:.5rem;padding:.75rem 1rem;z-index:200;animation:slideIn .3s ease;font-weight:600;font-size:.9rem}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:640px){.hdr h1{font-size:1.25rem}.stat-card .val{font-size:1.5rem}}
</style>
</head>
<body>
<!-- HEADER -->
<header class="hdr">
  <div class="container">
    <div class="hdr-row">
      <div>
        <h1>📚 Copy Master Arena</h1>
        <p>Master the copywriting niche through gamified practice</p>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-green" onclick="exportData()">💾 Export</button>
        <button class="btn btn-slate" onclick="showImport()">📥 Import</button>
        <button class="btn btn-red" onclick="resetAll()">🔄 Reset</button>
      </div>
    </div>
  </div>
</header>
<!-- TOAST -->
<div id="toast" style="display:none"></div>
<!-- MODAL OVERLAY -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>
<!-- MAIN -->
<main class="container" style="padding-top:1.5rem;padding-bottom:3rem">
<!-- STATS -->
<div class="stat-grid" id="statsPanel"></div>
<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview')">📊 Overview</button>
  <button class="tab-btn" onclick="switchTab('projects')">📋 Projects</button>
  <button class="tab-btn" onclick="switchTab('quests')">🎯 Quests</button>
  <button class="tab-btn" onclick="switchTab('battles')">👑 Battles</button>
  <button class="tab-btn" onclick="switchTab('practices')">🎯 Practices</button>
  <button class="tab-btn" onclick="switchTab('achievements')">🏆 Badges</button>
  <button class="tab-btn" onclick="switchTab('heatmap')">🔥 Heatmap</button>
</div>
<!-- TAB CONTENT -->
<div id="tabContent"></div>
</main>
<script>
// ═══════════════════════════════════════
// DATA STORE (localStorage)
// ═══════════════════════════════════════
const STORAGE_KEY = 'copymaster_data';
let data = loadData();
function defaultData(){ return {
  user:{id:'user-1',xp:0,level:1,streakDays:0,lastActivityDate:null},
  projects:[],
  quests:[],
  bossBattles:[],
  practices:[],
  achievements:[]
}}
function loadData(){
  try{ const d=JSON.parse(localStorage.getItem(STORAGE_KEY)); return d||defaultData(); }
  catch(e){ return defaultData(); }
}
function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const PROJECT_TEMPLATES=[
  {n:1,title:'The Application-Funnel Sales Page',desc:'High-ticket coach ($3K–$10K) application-based funnel — full sales page + application form',xp:500},
  {n:2,title:'The 5-Day Challenge Funnel',desc:'Free 5-day challenge to sell $497–$997 course — registration page + 5 emails + pitch',xp:500},
  {n:3,title:'The Webinar/VSL Script',desc:'Live/automated webinar script — hook, story, content, pitch, close',xp:600},
  {n:4,title:'The Evergreen Email Nurture',desc:'10–14 email nurture sequence from cold lead magnet subscriber to sales conversation',xp:500},
  {n:5,title:'The Teardown/Rewrite',desc:'Public rewrite of a real coach\'s sales page with before/after breakdown',xp:400},
  {n:6,title:'The Founder Story / About Page',desc:'About page copy turning personal story into a trust-building sales asset',xp:400},
  {n:7,title:'The LinkedIn Ghostwriting Pack',desc:'5 LinkedIn posts in fictional educator voice building toward a launch',xp:350}
];
const PRACTICE_CATEGORIES=[
  {cat:'research',label:'🔍 Research Habit',desc:'Live inside the niche — follow coaches, join challenges, build swipe file',examples:['Followed 3 coaches','Watched a webinar','Screenshot a sales page','Joined a free challenge','Analyzed a competitor funnel']},
  {cat:'frameworks',label:'📐 Frameworks',desc:'Master PAS, AIDA, Hero\'s Journey, Star-Story-Solution, 4Ps, StoryBrand',examples:['Diagrammed PAS example','Applied AIDA framework','Studied Hero\'s Journey','Applied Star-Story-Solution','Applied the 4 Ps framework','Applied StoryBrand Framework']},
  {cat:'voice-matching',label:'🎤 Voice Matching',desc:'Sound like your coach, not like yourself',examples:['Created voice profile','Read copy aloud in their voice','Analyzed sentence length/style','Watched 3+ hours of coach content','Wrote voice profile document']},
  {cat:'offer-literacy',label:'💰 Offer Literacy',desc:'Understand coaching biz models — front-end, core, high-ticket',examples:['Mapped a full funnel','Studied launch model','Analyzed pricing strategy','Compared 3 coaching businesses','Mapped opt-in to checkout flow']},
  {cat:'content-discipline',label:'📝 Content Discipline',desc:'2–3 LinkedIn posts/week, 1 long-form analysis/month',examples:['Posted a teardown','Posted an insight','Published long-form analysis','Shared spec work reveal','Engaged with coach content']},
  {cat:'feedback',label:'💬 Feedback Loop',desc:'Get critique from community and real coaches',examples:['Shared in Copy Chief','Got feedback from a coach','Posted on X/Twitter','Shared in Copyhackers group','Asked a coach for review']}
];
const BADGE_TEMPLATES=[
  {name:'First Blood',icon:'🎮',desc:'Started your first spec project'},
  {name:'Project Master',icon:'✅',desc:'Completed your first spec project'},
  {name:'Trio Achiever',icon:'🎯',desc:'Completed 3 spec projects'},
  {name:'Niche Expert',icon:'🏆',desc:'Completed all 7 spec projects'},
  {name:'Battle Winner',icon:'⚔️',desc:'Won your first boss battle'},
  {name:'Deal Maker',icon:'💰',desc:'Won 5 boss battles worth $5k+'},
  {name:'Habit Keeper',icon:'🔥',desc:'7-day practice streak'},
  {name:'Researcher',icon:'🔍',desc:'Completed 10 research activities'},
  {name:'Framework Scholar',icon:'📐',desc:'Completed 10 framework studies'},
  {name:'Voice Master',icon:'🎤',desc:'Completed 5 voice-matching exercises'},
  {name:'Content Creator',icon:'📝',desc:'Completed 10 content pieces'},
  {name:'Level 5 Master',icon:'⭐',desc:'Reached Level 5'},
  {name:'XP Collector',icon:'⚡',desc:'Earned 10,000 XP'},
  {name:'Speedrunner',icon:'⏱️',desc:'Finish a project within 24 hours of starting'},
  {name:'Consistency King',icon:'👑',desc:'30-day practice streak'}
];
// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const uid = () => 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
const fmtShort = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
const todayStr = () => new Date().toISOString().split('T')[0];
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}
function addXP(n){
  data.user.xp += n;
  const newLevel = 1+Math.floor(data.user.xp/1000);
  if(newLevel > data.user.level){ data.user.level=newLevel; toast('🎉 Level Up! You are now Level '+newLevel+'!'); }
}
function recordActivity(){
  const today=todayStr();
  if(data.user.lastActivityDate){
    const last=new Date(data.user.lastActivityDate).toISOString().split('T')[0];
    const diff=Math.floor((new Date(today)-new Date(last))/(86400000));
    if(diff===1) data.user.streakDays++;
    else if(diff>1) data.user.streakDays=1;
  } else data.user.streakDays=1;
  data.user.lastActivityDate=new Date().toISOString();
}
function checkAchievements(){
  const unlocked=data.achievements.map(a=>a.badgeName);
  const add=(name,icon,desc)=>{
    if(!unlocked.includes(name)){ data.achievements.push({id:uid(),badgeName:name,icon,description:desc,unlockedAt:new Date().toISOString()}); toast('🏆 Badge Unlocked: '+name); }
  };
  const pDone=data.projects.filter(p=>p.status==='completed').length;
  const pStarted=data.projects.length;
  const battlesWon=data.bossBattles.filter(b=>b.stage==='won').length;
  const wonValue=data.bossBattles.filter(b=>b.stage==='won').reduce((s,b)=>s+(b.value||0),0);
  const practices=data.practices;
  const researchCount=practices.filter(p=>p.category==='research').length;
  const frameworkCount=practices.filter(p=>p.category==='frameworks').length;
  const voiceCount=practices.filter(p=>p.category==='voice-matching').length;
  const contentCount=practices.filter(p=>p.category==='content-discipline').length;
  if(pStarted>=1) add('First Blood','🎮','Started your first spec project');
  if(pDone>=1) add('Project Master','✅','Completed your first spec project');
  if(pDone>=3) add('Trio Achiever','🎯','Completed 3 spec projects');
  if(pDone>=7) add('Niche Expert','🏆','Completed all 7 spec projects');
  if(battlesWon>=1) add('Battle Winner','⚔️','Won your first boss battle');
  if(battlesWon>=5&&wonValue>=5000) add('Deal Maker','💰','Won 5 boss battles worth $5k+');
  if(data.user.streakDays>=7) add('Habit Keeper','🔥','7-day practice streak');
  if(researchCount>=10) add('Researcher','🔍','Completed 10 research activities');
  if(frameworkCount>=10) add('Framework Scholar','📐','Completed 10 framework studies');
  if(voiceCount>=5) add('Voice Master','🎤','Completed 5 voice-matching exercises');
  if(contentCount>=10) add('Content Creator','📝','Completed 10 content pieces');
  if(data.user.level>=5) add('Level 5 Master','⭐','Reached Level 5');
  if(data.user.xp>=10000) add('XP Collector','⚡','Earned 10,000 XP');
  if(data.user.streakDays>=30) add('Consistency King','👑','30-day practice streak');
}
function refreshAll(){ renderStats(); renderTab(); saveData(); }
// ═══════════════════════════════════════
// STATS PANEL
// ═══════════════════════════════════════
function renderStats(){
  const u=data.user;
  const xpNext=u.xp%1000;
  const pct=(xpNext/1000*100).toFixed(0);
  document.getElementById('statsPanel').innerHTML=`
    <div class="stat-card a"><div class="lbl">⚡ Total XP</div><div class="val">${(u.xp/1000).toFixed(1)}k</div><div class="lbl" style="margin-top:.25rem">${u.xp%1000}/1000 to next level</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div></div>
    <div class="stat-card b"><div class="lbl">⭐ Level</div><div class="val">${u.level}</div><div class="lbl" style="margin-top:.25rem">${(u.level*1000)-u.xp} XP needed for Level ${u.level+1}</div></div>
    <div class="stat-card c"><div class="lbl">🔥 Streak</div><div class="val">${u.streakDays}</div><div class="lbl" style="margin-top:.25rem">${u.streakDays>=7?'🏆 Habit Keeper!':(7-u.streakDays)+' days to badge'}</div></div>
    <div class="stat-card d"><div class="lbl">💪 Status</div><div class="val" style="font-size:1.5rem">${u.level>=5?'🦾 Master':'🎮 Active'}</div><div class="lbl" style="margin-top:.25rem">Projects: ${data.projects.filter(p=>p.status==='completed').length}/${PROJECT_TEMPLATES.length}</div></div>
  `;
}
// ═══════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════
let currentTab='overview';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(tab.toLowerCase())||(tab==='battles'&&b.textContent.includes('Battles'))||(tab==='heatmap'&&b.textContent.includes('Heatmap'))));
  renderTab();
}
function renderTab(){
  const el=document.getElementById('tabContent');
  switch(currentTab){
    case 'overview': el.innerHTML=renderOverview(); break;
    case 'projects': el.innerHTML=renderProjects(); break;
    case 'quests': el.innerHTML=renderQuests(); break;
    case 'battles': el.innerHTML=renderBattles(); break;
    case 'practices': el.innerHTML=renderPractices(); break;
    case 'achievements': el.innerHTML=renderAchievements(); break;
    case 'heatmap': el.innerHTML=renderHeatmap(); break;
  }
}
// ═══════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════
function renderOverview(){
  return `<div class="grid2">${renderProjectsCompact()}${renderBattlesCompact()}</div>`;
}
function renderProjectsCompact(){
  const projs=data.projects.sort((a,b)=>a.projectNumber-b.projectNumber);
  let h=`<div><div class="flex-between" style="margin-bottom:1rem"><h3 style="margin:0">📋 Spec Projects</h3><button class="btn btn-purple" onclick="switchTab('projects')">View All</button></div>`;
  if(!projs.length) h+=`<div class="card"><p>No projects yet. Go to Projects tab to start!</p></div>`;
  else projs.forEach(p=>{
    const s=p.status==='completed'?'status-done':p.status==='in-progress'?'status-prog':'status-not';
    const ico=p.status==='completed'?'✅':p.status==='in-progress'?'🔄':'⏳';
    h+=`<div class="card"><div class="flex-between"><span class="tag ${s}">${ico} ${p.status.replace('-',' ')}</span><span class="xp-badge">+${p.xpReward} XP</span></div><h4 style="margin:.25rem 0;font-size:.9rem">P${p.projectNumber}: ${p.title}</h4><p style="font-size:.75rem">${p.description||''}</p></div>`;
  });
  h+=`</div>`;return h;
}
function renderBattlesCompact(){
  const battles=data.bossBattles;
  const active=battles.filter(b=>b.stage!=='won'&&b.stage!=='lost');
  const won=battles.filter(b=>b.stage==='won');
  let h=`<div><div class="flex-between" style="margin-bottom:1rem"><h3 style="margin:0">👑 Boss Battles</h3><button class="btn btn-purple" onclick="switchTab('battles')">View All</button></div>`;
  if(won.length) h+=`<div class="card" style="background:linear-gradient(135deg,#14532d,#166534);border-color:rgba(74,222,128,.4)"><p style="font-weight:700">🏆 Won: ${won.length} · $${won.reduce((s,b)=>s+(b.value||0),0).toLocaleString()}</p></div>`;
  if(!active.length && !won.length) h+=`<div class="card"><p>No boss battles yet. Go to Battles tab!</p></div>`;
  else active.slice(0,3).forEach(b=>{
    const sc=getBattleStageClass(b.stage);
    h+=`<div class="card" style="border-left:3px solid ${sc.color}"><div class="flex-between"><span>${sc.ico} <b>${b.prospectName||'?'}</b></span><span style="font-weight:700">$${(b.value||0).toLocaleString()}</span></div><p style="font-size:.75rem">${b.prospectNiche||''} · ${b.stage.replace('-',' ')}</p></div>`;
  });
  h+=`</div>`;return h;
}
function getBattleStageClass(stage){
  const m={won:{ico:'🏆',color:'#22c55e'},lost:{ico:'💀',color:'#ef4444'},negotiation:{ico:'⚔️',color:'#f59e0b'},proposal:{ico:'📋',color:'#3b82f6'},'initial-outreach':{ico:'🎯',color:'#8b5cf6'}};
  return m[stage]||{ico:'🎯',color:'#8b5cf6'};
}
// ═══════════════════════════════════════
// PROJECTS
// ═══════════════════════════════════════
function renderProjects(){
  const projs=data.projects.sort((a,b)=>a.projectNumber-b.projectNumber);
  let h=`<div class="flex-between" style="margin-bottom:1rem"><h3>📋 Spec Projects (${projs.filter(p=>p.status==='completed').length}/${PROJECT_TEMPLATES.length} done)</h3><button class="btn btn-purple" onclick="showAddProjectModal()">+ New Project</button></div>`;
  if(!projs.length) h+=`<div class="card" style="text-align:center;padding:2rem"><p style="font-size:1.25rem">No projects started yet!</p><p style="margin-top:.5rem">Click "+ New Project" to begin your journey.</p></div>`;
  projs.forEach(p=>{
    const s=p.status==='completed'?'status-done':p.status==='in-progress'?'status-prog':'status-not';
    const ico=p.status==='completed'?'✅':p.status==='in-progress'?'🔄':'⏳';
    h+=`<div class="card"><div class="flex-between"><span class="tag ${s}">${ico} ${(p.status||'not-started').replace('-',' ')}</span><span class="xp-badge">+${p.xpReward} XP</span></div><h4 style="margin:.25rem 0">Project ${p.projectNumber}: ${p.title}</h4><p style="font-size:.8rem;margin-bottom:.5rem">${p.description||''}</p>
    <select onchange="updateProjectStatus('${p.id}',this.value)" style="max-width:200px">
      <option value="not-started" ${p.status==='not-started'?'selected':''}>Not Started</option>
      <option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option>
      <option value="completed" ${p.status==='completed'?'selected':''}>Completed ✓</option>
    </select>
    <p style="font-size:.7rem;color:#64748b;margin-top:.5rem">Created: ${fmtDate(p.createdAt)} ${p.completedAt?'· Done: '+fmtDate(p.completedAt):''}</p>
    <button class="btn btn-red" style="margin-top:.5rem;font-size:.7rem;padding:.25rem .5rem" onclick="deleteProject('${p.id}')">🗑 Delete</button></div>`;
  });
  return h;
}
function showAddProjectModal(){
  let h=`<div class="modal"><h3 style="margin-bottom:1rem">Select a Project to Start</h3>`;
  PROJECT_TEMPLATES.forEach(t=>{
    const exists=data.projects.find(p=>p.projectNumber===t.n);

// HEATMAP
// ═══════════════════════════════════════
function renderHeatmap(){
  const acts=data.practices;
  // Build 84 days of data
  const today=new Date(); const start=new Date(today); start.setDate(start.getDate()-83);
  const heatData={};
  for(let i=0;i<84;i++){ const d=new Date(start); d.setDate(d.getDate()+i); heatData[d.toISOString().split('T')[0]]=0; }
  acts.forEach(a=>{ const ds=a.completedAt.split('T')[0]; if(heatData[ds]!==undefined) heatData[ds]++; });
  // Build week columns
  const weeks=[];
  let cur={};
  for(let i=0;i<84;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    cur[ds]=heatData[ds];
    if(d.getDay()===6){ weeks.push(cur); cur={}; }
  }
  if(Object.keys(cur).length) weeks.push(cur);
  const getClass=c=>c>=5?'heat-i5':c>=4?'heat-i4':c>=3?'heat-i3':c>=2?'heat-i2':c>=1?'heat-i1':'heat-i0';
  const total=Object.values(heatData).reduce((a,b)=>a+b,0);
  const activeDays=Object.values(heatData).filter(c=>c>0).length;
  const bestDay=Math.max(...Object.values(heatData));
  let h=`<h3 style="margin-bottom:1rem">🔥 84-Day Activity Heatmap</h3>`;
  h+=`<div class="card" style="background:linear-gradient(135deg,#14532d,#166534);border-color:rgba(74,222,128,.3);margin-bottom:1rem"><p style="font-weight:700">📊 ${total} activities · ${activeDays} active days · avg ${(total/84).toFixed(1)}/day</p></div>`;
  // Day labels
  h+=`<div style="display:flex;gap:1px;overflow-x:auto"><div style="display:flex;flex-direction:column;gap:2px;margin-right:2px">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>h+=`<div style="width:14px;height:14px;font-size:.5rem;color:#64748b;text-align:center;line-height:14px">${d[0]}</div>`);
  h+=`</div>`;
  weeks.forEach(w=>{
    h+=`<div class="heat-col">`;
    [0,1,2,3,4,5,6].forEach(di=>{
      const keys=Object.keys(w);
      const dk=keys[di]||'';
      const c=dk?w[dk]:-1;
      if(c>=0) h+=`<div class="heat-cell ${getClass(c)}" title="${dk}: ${c} activities"></div>`;
      else h+=`<div style="width:14px;height:14px;opacity:.1;background:#1e293b;border-radius:2px"></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  // Legend
  h+=`<div style="display:flex;align-items:center;gap:.75rem;margin-top:1rem;font-size:.7rem;color:#94a3b8"><span>Less</span><div class="heat-cell heat-i0"></div><div class="heat-cell heat-i1"></div><div class="heat-cell heat-i2"></div><div class="heat-cell heat-i3"></div><div class="heat-cell heat-i4"></div><div class="heat-cell heat-i5"></div><span>More</span></div>`;
  // Stats
  h+=`<div class="grid2" style="margin-top:1.5rem">
    <div class="card"><h4>📈 Statistics</h4>
      <div style="display:flex;justify-content:space-between;padding:.25rem 0"><span style="color:#94a3b8">Total:</span><span style="color:#c084fc;font-weight:700">${total}</span></div>
      <div style="display:flex;justify-content:space-between;padding:.25rem 0"><span style="color:#94a3b8">Active Days:</span><span style="color:#86efac;font-weight:700">${activeDays}</span></div>
      <div style="display:flex;justify-content:space-between;padding:.25rem 0"><span style="color:#94a3b8">Average/Day:</span><span style="color:#93c5fd;font-weight:700">${(total/84).toFixed(1)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:.25rem 0"><span style="color:#94a3b8">Best Day:</span><span style="color:#fcd34d;font-weight:700">${bestDay}</span></div>
    </div>
    <div class="card"><h4>💡 Consistency Tips</h4>
      <ul style="font-size:.8rem;color:#94a3b8;padding-left:1rem">
        <li style="margin-bottom:.25rem">Aim for at least one activity per day</li>
        <li style="margin-bottom:.25rem">Darker green = more activities. Push your limits!</li>
        <li style="margin-bottom:.25rem">Consistency beats perfection — even one small practice counts</li>
        <li>Build a 7-day streak to unlock the &quot;Habit Keeper&quot; badge</li>
      </ul>
    </div>
  </div>`;
  return h;
}

function showImport(){

function handleImportFile(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    document.getElementById('importText').value=e.target.result;
  };
  reader.readAsText(file);
}
function doImport(){
  const text=document.getElementById('importText')?.value;
  if(!text){ toast('❌ Please paste JSON data first'); return; }
  try{
    const imported=JSON.parse(text);
    if(!imported.user||!imported.projects){ toast('❌ Invalid data format'); return; }
    if(!confirm('⚠ This will replace ALL current data with the imported data. Continue?')) return;
    data=imported;
    saveData();
    refreshAll();
    closeModal();
    toast('📥 Data imported successfully!');
  }catch(e){
    toast('❌ Invalid JSON format');
  }
}
function resetAll(){
  if(!confirm('⚠ WARNING: This will DELETE all your progress! Are you sure?')) return;
  if(!confirm('Final confirmation: ALL data will be lost. Continue?')) return;
  data=defaultData();
  saveData();
  refreshAll();
  toast('🔄 All data has been reset');
}
// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderStats();
renderTab();
</script>
