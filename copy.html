<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Strategist Arena | Micro-Quest Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.9);
            --accent: #8b5cf6;
            --success: #10b981;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 1rem;
        }
        .xp-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            transition: width 0.4s ease;
        }
        .quest-card {
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        .quest-card:hover {
            transform: translateX(5px);
            background: rgba(30, 41, 59, 0.8);
        }
        .category-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
        .tab-active {
            background: var(--accent);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400">
                    COPY ARENA <span class="text-white">v2.0</span>
                </h1>
                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Anti-Burnout Micro-Questing</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportData()" class="glass px-4 py-2 text-xs font-bold hover:bg-white/5 transition">
                    <i class="fas fa-save mr-2"></i>EXPORT
                </button>
                <button onclick="resetData()" class="glass px-4 py-2 text-xs font-bold text-red-400 hover:bg-red-500/10 transition">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </header>
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-5">
                <div class="text-[10px] font-bold text-slate-500 mb-1">CURRENT RANK</div>
                <div class="text-2xl font-black">LVL <span id="lvl">1</span></div>
                <div class="xp-bar mt-3"><div id="xp-fill" class="xp-fill" style="width: 0%"></div></div>
            </div>
            <div class="glass p-5 border-orange-500/20">
                <div class="text-[10px] font-bold text-slate-500 mb-1">STREAK</div>
                <div class="text-2xl font-black text-orange-500"><i class="fas fa-fire mr-2"></i><span id="streak">0</span></div>
            </div>
            <div class="glass p-5 border-emerald-500/20">
                <div class="text-[10px] font-bold text-slate-500 mb-1">LIFETIME XP</div>
                <div class="text-2xl font-black text-emerald-400" id="total-xp">0</div>
            </div>
            <div class="glass p-5 border-blue-500/20">
                <div class="text-[10px] font-bold text-slate-500 mb-1">COMPLETED</div>
                <div class="text-2xl font-black text-blue-400" id="done-count">0</div>
            </div>
        </div>
        <!-- Navigation -->
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="setFilter('all')" class="nav-btn tab-active px-6 py-2 glass text-xs font-black uppercase">All Quests</button>
            <button onclick="setFilter('Research')" class="nav-btn px-6 py-2 glass text-xs font-black uppercase">Research</button>
            <button onclick="setFilter('Strategy')" class="nav-btn px-6 py-2 glass text-xs font-black uppercase">Strategy</button>
            <button onclick="setFilter('Drafting')" class="nav-btn px-6 py-2 glass text-xs font-black uppercase">Drafting</button>
            <button onclick="setFilter('Outreach')" class="nav-btn px-6 py-2 glass text-xs font-black uppercase">Outreach</button>
        </div>
        <!-- Quest List -->
        <div class="grid grid-cols-1 gap-3" id="quest-container">
            <!-- Injected via JS -->
        </div>
        <!-- Heatmap -->
        <div class="mt-12 glass p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Activity Map</h3>
                <div class="flex gap-1" id="heatmap-legend">
                    <div class="w-2 h-2 rounded-sm bg-slate-800"></div>
                    <div class="w-2 h-2 rounded-sm bg-emerald-900"></div>
                    <div class="w-2 h-2 rounded-sm bg-emerald-500"></div>
                </div>
            </div>
            <div class="flex gap-1 overflow-x-auto no-scrollbar" id="heatmap"></div>
        </div>
    </div>
    <!-- Achievement Notification -->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-32 transition-transform duration-500">
        <div class="glass bg-emerald-600 border-emerald-400 p-4 flex items-center gap-4 shadow-2xl">
            <div class="text-2xl">⚡</div>
            <div>
                <div class="text-[10px] font-bold uppercase text-emerald-200">Quest Completed</div>
                <div class="font-black text-white" id="toast-msg">+50 XP Earned</div>
            </div>
        </div>
    </div>
    <script>
        const QUEST_DATABASE = [
            // Phase 1: Research
            { id: 1, cat: "Research", title: "The Slop Sweep", time: "15m", xp: 50, desc: "Audit competitor page; highlight 3 generic 'AI slop' phrases." },
            { id: 2, cat: "Research", title: "Skepticism Check", time: "20m", xp: 75, desc: "Run Trust Funnel diagnostic; find where user trust leaks out." },
            { id: 3, cat: "Research", title: "VoC Mining", time: "15m", xp: 50, desc: "Extract 3 human-centric customer quotes from reviews." },
            { id: 4, cat: "Research", title: "Friction Hunting", time: "20m", xp: 75, desc: "Map user flow from opt-in to checkout; note friction points." },
            
            // Phase 2: Strategy
            { id: 5, cat: "Strategy", title: "The Switch Map", time: "25m", xp: 100, desc: "Outline 'Curious 2 Converted' journey for 1 target persona." },
            { id: 6, cat: "Strategy", title: "Angle Generation", time: "20m", xp: 80, desc: "Write 5 vastly different headline angles (Speed vs Trust)." },
            { id: 7, cat: "Strategy", title: "Wireframing Flow", time: "30m", xp: 120, desc: "Block landing page sections (Hero, Proof, Agitation) without copy." },
            { id: 8, cat: "Strategy", title: "Verification Pitch", time: "25m", xp: 100, desc: "Draft value prop focused on security & verified trust." },
            
            // Phase 3: Drafting
            { id: 9, cat: "Drafting", title: "Hero Section Strike", time: "30m", xp: 150, desc: "Draft H1, subheadline, and primary CTA button only." },
            { id: 10, cat: "Drafting", title: "The Agitator", time: "35m", xp: 150, desc: "Write section validating user frustrations & pain points." },
            { id: 11, cat: "Drafting", title: "Feature Translation", time: "30m", xp: 125, desc: "Translate 1 tech feature into a human-centric benefit paragraph." },
            { id: 12, cat: "Drafting", title: "Micro-Copy Polish", time: "25m", xp: 100, desc: "Punch up button text, form fields, and guarantee badges." },
            
            // Phase 4: Outreach
            { id: 13, cat: "Outreach", title: "The Teardown Hook", time: "15m", xp: 50, desc: "Write a personalized 3-line hook for a cold email." },
            { id: 14, cat: "Outreach", title: "Package Assembly", time: "15m", xp: 50, desc: "Compile research & headlines into a clean pitch package." }
        ];
        let state = {
            xp: 0,
            streak: 0,
            lastDate: null,
            history: {}, // "YYYY-MM-DD": count
            completedIds: [],
            filter: 'all'
        };
        function init() {
            const saved = localStorage.getItem('copy_arena_v2');
            if (saved) state = JSON.parse(saved);
            refreshUI();
        }
        function save() {
            localStorage.setItem('copy_arena_v2', JSON.stringify(state));
            refreshUI();
        }
        function setFilter(f) {
            state.filter = f;
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('tab-active');
                if(b.innerText.toLowerCase() === f.toLowerCase() || (f === 'all' && b.innerText === 'All Quests')) {
                    b.classList.add('tab-active');
                }
            });
            refreshUI();
        }
        function completeQuest(id) {
            const quest = QUEST_DATABASE.find(q => q.id === id);
            state.xp += quest.xp;
            state.completedIds.push({ id, date: new Date().toISOString() });
            
            const today = new Date().toISOString().split('T')[0];
            state.history[today] = (state.history[today] || 0) + 1;
            if (state.lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yStr = yesterday.toISOString().split('T')[0];
                state.streak = (state.lastDate === yStr) ? state.streak + 1 : 1;
                state.lastDate = today;
            }
            showToast(`+${quest.xp} XP: ${quest.title}`);
            save();
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }
        function refreshUI() {
            // Stats
            document.getElementById('lvl').innerText = Math.floor(state.xp / 1000) + 1;
            document.getElementById('xp-fill').style.width = (state.xp % 1000 / 10) + '%';
            document.getElementById('total-xp').innerText = state.xp.toLocaleString();
            document.getElementById('streak').innerText = state.streak;
            document.getElementById('done-count').innerText = state.completedIds.length;
            // List
            const container = document.getElementById('quest-container');
            container.innerHTML = '';
            
            const filtered = state.filter === 'all' 
                ? QUEST_DATABASE 
                : QUEST_DATABASE.filter(q => q.cat === state.filter);
            filtered.forEach(q => {
                const card = document.createElement('div');
                card.className = 'quest-card glass p-4 flex justify-between items-center border-l-4';
                card.style.borderColor = getCatColor(q.cat);
                
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="category-tag" style="background:${getCatColor(q.cat)}22; color:${getCatColor(q.cat)}">${q.cat}</span>
                            <span class="text-[10px] font-bold text-slate-500"><i class="far fa-clock mr-1"></i>${q.time}</span>
                        </div>
                        <h4 class="font-black text-sm uppercase tracking-tight">${q.title}</h4>
                        <p class="text-xs text-slate-400 mt-1 max-w-md">${q.desc}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="text-xs font-black text-violet-400">+${q.xp} XP</div>
                        <button onclick="completeQuest(${q.id})" class="bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-1 rounded text-[10px] font-black uppercase transition-all">
                            Complete
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            renderHeatmap();
        }
        function getCatColor(cat) {
            return {
                Research: '#38bdf8',
                Strategy: '#c084fc',
                Drafting: '#fb923c',
                Outreach: '#4ade80'
            }[cat];
        }
        function renderHeatmap() {
            const h = document.getElementById('heatmap');
            h.innerHTML = '';
            const today = new Date();
            
            for(let i=0; i<50; i++) {
                const d = new Date();
                d.setDate(today.getDate() - (49 - i));
                const ds = d.toISOString().split('T')[0];
                const count = state.history[ds] || 0;
                
                const cell = document.createElement('div');
                cell.className = 'w-3 h-3 rounded-sm flex-shrink-0 transition-all';
                cell.style.backgroundColor = count === 0 ? '#1e293b' : (count > 2 ? '#10b981' : '#064e3b');
                cell.title = `${ds}: ${count} Quests`;
                h.appendChild(cell);
            }
        }
        function exportData() {
            const data = JSON.stringify(state);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `copy-arena-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
        function resetData() {
            if(confirm("Erase all progress?")) {
                localStorage.clear();
                location.reload();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
