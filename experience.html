<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Trust Gap Protocol</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0d1b2a;
  --navy-mid:#11223a;
  --cream:#f0ebe0;
  --cream-dim:#a89f8c;
  --gold:#c9a84c;
  --gold-light:#e2c97e;
  --white:#ffffff;
  --muted:#4a5f75;
  --accent:#c9a84c;
}

html,body{
  width:100%;height:100%;
  background:var(--navy);
  color:var(--cream);
  font-family:'Georgia',serif;
  overflow:hidden;
  user-select:none;
}

/* ── CANVAS ── */
#stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  z-index:10;
}

/* ── NOISE ── */
#noise{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── VIGNETTE ── */
#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(5,12,22,0.8) 100%);
}

/* ── PROGRESS LABEL ── */
#progress-label{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Georgia',serif;
  font-size:0.68rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
  z-index:100;
  transition:color 1s ease, opacity 0.5s ease;
  white-space:nowrap;
}
#progress-label.lit{color:var(--gold);}

/* ── PROGRESS BAR ── */
#progress-bar-wrap{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  width:min(320px,70vw);height:1px;
  background:rgba(255,255,255,0.06);
  z-index:100;
  border-radius:2px;
  overflow:hidden;
}
#progress-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(to right,var(--muted),var(--gold));
  transition:width 0.6s ease;
}

/* ── MAIN TEXT AREA ── */
#text-block{
  max-width:min(640px,90vw);
  width:100%;
  text-align:center;
  position:relative;
  z-index:10;
  min-height:280px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* ── LINE STYLES ── */
.line{
  display:block;
  opacity:0;
  font-family:'Georgia',serif;
  font-size:clamp(1.15rem,3.2vw,1.65rem);
  font-weight:400;
  line-height:1.7;
  color:var(--cream);
  margin-bottom:4px;
  transition:opacity 0.3s ease;
  position:relative;
}
.line.visible{opacity:1;}
.line.dim{opacity:0.35;color:var(--cream-dim);}
.line.large{
  font-size:clamp(1.8rem,5vw,3rem);
  font-weight:700;
  margin-bottom:8px;
}
.line.huge{
  font-size:clamp(2.4rem,7vw,4.5rem);
  font-weight:700;
  letter-spacing:-0.02em;
  margin-bottom:8px;
}
.line.italic{font-style:italic;}
.line.muted{color:var(--cream-dim); font-size:clamp(1rem,2.5vw,1.3rem);}
.line.gold{color:var(--gold-light);}
.line.brand{
  font-family:'Georgia',serif;
  font-size:clamp(1rem,2.8vw,1.4rem);
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold);
}
.line.shaking{animation:shake 0.45s ease forwards;}

/* ── CURSOR BLINK ── */
.cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--cream);
  margin-left:3px;
  vertical-align:middle;
  animation:blink 0.85s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── SHAKE ── */
@keyframes shake{
  0%{transform:translateX(0);}
  15%{transform:translateX(-7px);}
  30%{transform:translateX(6px);}
  45%{transform:translateX(-5px);}
  60%{transform:translateX(4px);}
  75%{transform:translateX(-3px);}
  90%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* ── BLANK PAUSE overlay ── */
#blank-overlay{
  position:fixed;inset:0;
  background:var(--navy);
  z-index:200;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
#blank-overlay.on{opacity:1;}

/* ── CLICK INDICATOR ── */
#click-hint{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  z-index:100;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
}
#click-hint.show{opacity:1;}
#click-hint .hint-text{
  font-size:0.65rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--muted);
}
#click-hint .hint-arrow{
  font-size:1rem;
  color:var(--muted);
  animation:float-arrow 2s ease-in-out infinite;
}
@keyframes float-arrow{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(5px);}
}

/* ── CHOICE SCREEN ── */
#choice-screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
  background:var(--navy);
}
#choice-screen.show{opacity:1;pointer-events:all;}
#choice-screen h3{
  font-family:'Georgia',serif;
  font-size:clamp(1rem,2.5vw,1.3rem);
  color:var(--cream-dim);
  margin-bottom:10px;
  letter-spacing:0.04em;
  font-weight:400;
}
#choice-screen .choice-q{
  font-family:'Georgia',serif;
  font-size:clamp(1.3rem,3.5vw,2rem);
  color:var(--cream);
  margin-bottom:36px;
  text-align:center;
  line-height:1.5;
}
.choice-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  max-width:500px;width:100%;
}
.choice-btn{
  font-family:'Georgia',serif;
  font-size:clamp(0.85rem,2vw,1rem);
  color:var(--cream);
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:12px;
  padding:18px 16px;
  cursor:pointer;
  transition:background 0.3s,border-color 0.3s,transform 0.2s;
  text-align:center;
  line-height:1.4;
}
.choice-btn:hover{
  background:rgba(201,168,76,0.1);
  border-color:var(--gold);
  transform:translateY(-2px);
}
.choice-btn:active{transform:scale(0.97);}

/* ── SOLUTION PANEL ── */
#solution-screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity 0.8s ease;
  background:var(--navy);
  overflow-y:auto;
}
#solution-screen.show{opacity:1;pointer-events:all;}
#solution-screen.gold-bg{
  background:radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.08) 0%, var(--navy) 70%);
}
.sol-inner{
  max-width:min(620px,90vw);
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
}
.sol-line{
  font-family:'Georgia',serif;
  font-size:clamp(1rem,2.8vw,1.35rem);
  color:var(--cream);
  line-height:1.8;
  opacity:0;
  transform:translateY(12px);
  transition:opacity 0.6s ease, transform 0.6s ease;
  margin-bottom:6px;
}
.sol-line.vis{opacity:1;transform:translateY(0);}
.sol-line.dim{color:var(--cream-dim);}
.sol-line.large{
  font-size:clamp(1.5rem,4vw,2.4rem);
  font-weight:700;
  margin-bottom:10px;
}
.sol-line.brand{
  font-size:clamp(0.9rem,2.2vw,1.1rem);
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:4px;
}
.sol-line.italic{font-style:italic;}
.sol-line.gold{color:var(--gold-light);}
.sol-divider{
  width:0;height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:22px 0;
  opacity:0;
  transition:width 1s 0.3s ease, opacity 0.5s 0.3s ease;
}
.sol-divider.vis{width:160px;opacity:0.5;}

/* Checkmark list */
.check-list{
  list-style:none;
  text-align:left;
  margin:16px 0;
  display:flex;flex-direction:column;gap:10px;
  width:100%;max-width:480px;
}
.check-list li{
  font-family:'Georgia',serif;
  font-size:clamp(0.9rem,2.2vw,1.05rem);
  color:var(--cream-dim);
  padding:10px 16px;
  border-left:2px solid rgba(201,168,76,0.3);
  line-height:1.5;
  opacity:0;
  transform:translateX(-10px);
  transition:opacity 0.5s ease, transform 0.5s ease, border-color 0.3s;
}
.check-list li:hover{border-color:var(--gold);}
.check-list li.vis{opacity:1;transform:translateX(0);}
.check-list li strong{color:var(--cream);}
.check-mark{color:var(--gold);margin-right:10px;}

/* Results list */
.result-list{
  list-style:none;
  text-align:left;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:8px;
  margin:12px 0;
}
.result-list li{
  font-family:'Georgia',serif;
  font-size:clamp(0.9rem,2.2vw,1.05rem);
  color:var(--cream-dim);
  padding:8px 0;
  opacity:0;
  transform:translateY(8px);
  transition:opacity 0.5s ease, transform 0.5s ease;
  line-height:1.6;
}
.result-list li.vis{opacity:1;transform:translateY(0);}

/* CTA */
.cta-block{
  margin-top:28px;
  opacity:0;
  transform:translateY(14px);
  transition:opacity 0.8s ease, transform 0.8s ease;
  text-align:center;
}
.cta-block.vis{opacity:1;transform:translateY(0);}
.cta-eyebrow{
  font-size:0.75rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
  font-family:'Georgia',serif;
}
.cta-copy{
  font-family:'Georgia',serif;
  font-size:clamp(1rem,2.5vw,1.25rem);
  color:var(--cream-dim);
  line-height:1.7;
  max-width:480px;
  margin:0 auto 24px;
}
.cta-copy em{color:var(--cream);font-style:normal;}
.cta-btn{
  display:inline-block;
  font-family:'Georgia',serif;
  font-size:clamp(0.88rem,2vw,1rem);
  font-weight:400;
  letter-spacing:0.1em;
  color:var(--navy);
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  border:none;border-radius:100px;
  padding:16px 44px;
  cursor:pointer;
  text-decoration:none;
  transition:transform 0.25s,box-shadow 0.25s,filter 0.25s;
  box-shadow:0 4px 30px rgba(201,168,76,0.3);
}
.cta-btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 44px rgba(201,168,76,0.45);
  filter:brightness(1.07);
}

/* ── RIPPLE ── */
.rpl{position:relative;overflow:hidden;}
.rpl-circle{
  position:absolute;border-radius:50%;
  background:rgba(201,168,76,0.2);
  transform:scale(0);
  animation:rpl-out 0.6s linear forwards;
  pointer-events:none;
}
@keyframes rpl-out{to{transform:scale(4);opacity:0;}}

/* ── GLOBAL CLICK AREA ── */
#click-area{
  position:fixed;inset:0;z-index:30;
  cursor:pointer;
}

/* ── PARTICLES ── */
#particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.ptcl{
  position:absolute;border-radius:50%;
  background:var(--gold);opacity:0;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(110vh) scale(0.3);opacity:0;}
  10%{opacity:0.1;}90%{opacity:0.04;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* ── MOBILE ── */
@media(max-width:480px){
  .choice-grid{grid-template-columns:1fr;}
  #progress-label{font-size:0.6rem;}
}
</style>
</head>
<body>

<div id="particles"></div>
<div id="noise"></div>
<div id="vignette"></div>
<div id="blank-overlay"></div>

<!-- Main clickable stage -->
<div id="click-area"></div>

<div id="stage">
  <div id="text-block"></div>
</div>

<div id="click-hint">
  <span class="hint-arrow">↓</span>
  <span class="hint-text">Click to continue</span>
</div>

<div id="progress-label">Following the buyer's journey…</div>
<div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>

<!-- CHOICE SCREEN -->
<div id="choice-screen">
  <h3>Quick question —</h3>
  <div class="choice-q">Who do you mostly sell to?</div>
  <div class="choice-grid">
    <button class="choice-btn rpl" onclick="makeChoice(this)">Skeptical buyers who've been burned before</button>
    <button class="choice-btn rpl" onclick="makeChoice(this)">Midlifers who think carefully before spending</button>
    <button class="choice-btn rpl" onclick="makeChoice(this)">High-ticket clients who need deep trust first</button>
    <button class="choice-btn rpl" onclick="makeChoice(this)">Honestly? All of the above</button>
  </div>
</div>

<!-- SOLUTION SCREEN -->
<div id="solution-screen">
  <div class="sol-inner" id="sol-inner"></div>
</div>

<script>
// ─────────────────────────────────────────────
// SCREENPLAY
// Each "beat" is an object:
//   text      – what to show (replaces block)
//   append    – add line(s) below existing
//   style     – CSS classes for the line
//   delay     – ms before auto-showing next (0 = wait for click)
//   blank     – pause with blank screen before reveal (ms)
//   shake     – shake previous lines on entry
//   typewrite – type the text character by character
//   showHint  – show click-to-continue hint
//   hideHint  – hide hint
//   choice    – trigger choice screen
//   solution  – trigger solution screen
//   label     – progress label text
// ─────────────────────────────────────────────

const TOTAL_BEATS = 31; // approx, for progress

const beats = [
  // 1
  { text:"So...", style:"huge italic", typewrite:true, showHint:true, label:"Finding the gap… 3%" },

  // 2
  { text:"You've tried almost everything, haven't you?", style:"muted italic", append:true, showHint:true, label:"Finding the gap… 6%" },

  // 3
  { clear:true, text:"The traffic comes.", style:"", label:"Following the buyer… 10%" },
  { text:"People click.", style:"", append:true },
  { text:"They arrive on your page.", style:"", append:true },
  { text:"So far...", style:"muted italic", append:true, delay:500 },
  { text:"Everything is working exactly as it should.", style:"gold italic", append:true, showHint:true, label:"Following the buyer… 16%" },

  // 4
  { clear:true, text:"They read.", style:"", label:"Following the buyer… 20%" },
  { text:"They scroll.", style:"", append:true },
  { text:"They spend longer than you expected.", style:"", append:true },
  { text:"Some even nod along.", style:"muted italic", append:true, delay:400 },
  { text:"You can almost feel the sale coming.", style:"large italic", append:true, showHint:true, label:"Following the buyer… 26%" },

  // 5 — dramatic blank + "Then... Nothing."
  { clear:true, text:"Then...", style:"large italic", blank:900, label:"The moment it breaks… 30%" },
  { text:"Nothing.", style:"huge", append:true, showHint:true, label:"The moment it breaks… 33%" },

  // 6
  { clear:true, text:"No purchase.", style:"", label:"The moment it breaks… 37%" },
  { text:"No booking.", style:"", append:true },
  { text:"No reply.", style:"", append:true },
  { text:"No \"I'll take it.\"", style:"", append:true },
  { text:"Just another visitor disappearing into your analytics. Forever.", style:"muted italic", append:true, showHint:true, label:"The moment it breaks… 41%" },

  // 7 — choice screen trigger
  { choice:true, label:"Reading your situation… 44%" },

  // 8
  { clear:true, text:"And eventually...", style:"muted italic", label:"Finding the cause… 46%" },
  { text:"you ask yourself the same questions every founder asks.", style:"", append:true, delay:500 },
  { text:"Is the offer wrong?", style:"large italic", append:true, showHint:true, label:"Finding the cause… 48%" },

  // 9
  { clear:true, text:"Maybe it's the pricing.", style:"large italic", shake:true, label:"Finding the cause… 50%" },
  { clear:true, text:"Maybe the design.", style:"large italic", shake:true, delay:200, label:"Finding the cause… 52%" },
  { clear:true, text:"Maybe the headline.", style:"large italic", shake:true, delay:200, showHint:true, label:"Finding the cause… 54%" },

  // 10
  { clear:true, text:"Maybe...", style:"muted italic", label:"Finding the cause… 57%" },
  { text:"it's me.", style:"huge italic gold", append:true, showHint:true, label:"Finding the cause… 60%" },

  // 11
  { clear:true, text:"So you change things.", style:"", label:"The cycle continues… 63%" },
  { text:"Again.", style:"gold italic large", append:true, delay:300 },
  { text:"New headline. New pricing. New photos. New CTA.", style:"muted", append:true, delay:300 },
  { text:"New testimonials. More social proof. Another redesign.", style:"muted", append:true, delay:300 },
  { text:"Another funnel. Another launch.", style:"muted", append:true, showHint:true, label:"The cycle continues… 66%" },

  // 12
  { clear:true, text:"Sometimes...", style:"muted italic", label:"Recognising the pattern… 69%" },
  { text:"the numbers improve.", style:"", append:true, delay:400 },
  { text:"Just enough to keep you hoping.", style:"italic gold", append:true, delay:300 },
  { text:"But never enough to explain why people still leave.", style:"muted", append:true, showHint:true, label:"Recognising the pattern… 72%" },

  // 13
  { clear:true, text:"Here's what almost nobody tells you.", style:"brand", label:"The real truth… 76%" },
  { text:"People don't buy because they understand you.", style:"", append:true, delay:500 },
  { text:"People buy because they feel understood.", style:"large italic gold", append:true, showHint:true, label:"The real truth… 79%" },

  // 14
  { clear:true, text:"Most brands are talking to buyers...", style:"muted italic", label:"Mapping the gap… 81%" },
  { text:"who don't exist.", style:"huge", append:true, showHint:true, label:"Mapping the gap… 83%" },

  // 15
  { clear:true, text:"Because the people arriving on your website aren't blank slates.", style:"", label:"Mapping the gap… 85%" },
  { text:"They're carrying baggage.", style:"large italic", append:true, showHint:true, label:"Mapping the gap… 86%" },

  // 16
  { clear:true, text:"Some have been burned.", style:"", label:"Understanding your buyer… 87%" },
  { clear:true, text:"Some have bought five different \"solutions.\" None worked.", style:"", showHint:true, label:"Understanding your buyer… 88%" },

  // 17
  { clear:true, text:"Some are in midlife.", style:"", label:"Understanding your buyer… 89%" },
  { text:"Every purchase feels bigger now.", style:"italic", append:true, delay:400 },
  { text:"More expensive. Harder to reverse.", style:"muted", append:true, showHint:true, label:"Understanding your buyer… 90%" },

  // 18
  { clear:true, text:"Some have become professional skeptics.", style:"", label:"Understanding your buyer… 91%" },
  { text:"Not because they're difficult.", style:"muted italic", append:true, delay:400 },
  { text:"Because experience taught them to be.", style:"muted italic", append:true, showHint:true, label:"Understanding your buyer… 92%" },

  // 19
  { clear:true, text:"Yet most websites speak as if none of that happened.", style:"large italic muted", showHint:true, label:"Seeing the gap… 93%" },

  // 20
  { clear:true, text:"They shout benefits...", style:"", label:"Seeing the gap… 94%" },
  { text:"when buyers are still asking,", style:"muted italic", append:true, delay:400 },
  { text:"\"Can I trust you?\"", style:"large italic gold", append:true, showHint:true, label:"Seeing the gap… 94%" },

  // 21
  { clear:true, text:"They rush to the offer...", style:"", label:"Seeing the gap… 95%" },
  { text:"before earning attention.", style:"muted italic", append:true, showHint:true, label:"Seeing the gap… 95%" },

  // 22
  { clear:true, text:"They explain features...", style:"", label:"Seeing the gap… 96%" },
  { text:"while fear is still driving every decision.", style:"muted italic", append:true, showHint:true, label:"Seeing the gap… 96%" },

  // 23
  { clear:true, text:"And that's where conversions quietly die.", style:"", label:"The gap revealed… 97%" },
  { text:"It's not that your product isn't valuable.", style:"muted", append:true, delay:500 },
  { text:"Just that your message arrived...", style:"muted italic", append:true, delay:400 },
  { text:"before your prospect was ready to hear it.", style:"italic gold", append:true, showHint:true, label:"The gap revealed… 97%" },

  // 24
  { clear:true, text:"Every skeptical buyer has invisible questions.", style:"", label:"Naming the gap… 98%" },
  { text:"Until those questions are answered...", style:"muted italic", append:true, delay:500 },
  { text:"nothing else matters.", style:"large italic", append:true, showHint:true, label:"Naming the gap… 98%" },

  // 25
  { clear:true, text:"That's the gap.", style:"large brand", label:"Gap identified. 99%" },
  { text:"The distance between", style:"muted", append:true, delay:400 },
  { text:"\"This sounds interesting...\"", style:"italic", append:true, delay:300 },
  { text:"and", style:"muted", append:true, delay:200 },
  { text:"\"I trust this enough to buy.\"", style:"large italic gold", append:true, showHint:true, label:"Gap identified. 99%" },

  // 26
  { clear:true, text:"Most brands never see that gap.", style:"", label:"Gap identified. 99%" },
  { text:"They just keep throwing better offers across it.", style:"muted italic", append:true, showHint:true, label:"Gap identified. 99%" },

  // 27
  { clear:true, text:"I help you find THAT gap.", style:"large", showHint:true, label:"The protocol. 100%" },

  // SOLUTION
  { solution:true }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let beatIndex = 0;
let busy = false;
let hintVisible = false;
let inChoice = false;
let inSolution = false;
let solutionStep = 0;

const textBlock = document.getElementById('text-block');
const blankOverlay = document.getElementById('blank-overlay');
const clickHint = document.getElementById('click-hint');
const progressLabel = document.getElementById('progress-label');
const progressFill = document.getElementById('progress-bar-fill');
const choiceScreen = document.getElementById('choice-screen');
const solutionScreen = document.getElementById('solution-screen');
const solInner = document.getElementById('sol-inner');
const clickArea = document.getElementById('click-area');

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className='ptcl';
    const s=Math.random()*2.5+0.5;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;
      animation-duration:${16+Math.random()*20}s;animation-delay:${Math.random()*14}s;`;
    c.appendChild(p);
  }
})();

// ─────────────────────────────────────────────
// RIPPLE
// ─────────────────────────────────────────────
function addRipple(el,e){
  const rect=el.getBoundingClientRect();
  const circle=document.createElement('div');
  circle.className='rpl-circle';
  const size=Math.max(rect.width,rect.height);
  circle.style.cssText=`width:${size}px;height:${size}px;
    left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  el.appendChild(circle);
  setTimeout(()=>circle.remove(),650);
}
document.querySelectorAll('.rpl').forEach(el=>{
  el.addEventListener('click',e=>addRipple(el,e));
});

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────
function setProgress(label, pct){
  if(label) progressLabel.textContent = label;
  if(pct !== undefined) progressFill.style.width = pct+'%';
}

// ─────────────────────────────────────────────
// SHOW / HIDE HINT
// ─────────────────────────────────────────────
function showHint(){ clickHint.classList.add('show'); hintVisible=true; }
function hideHint(){ clickHint.classList.remove('show'); hintVisible=false; }

// ─────────────────────────────────────────────
// TYPEWRITE
// ─────────────────────────────────────────────
function typewrite(el, text, cb){
  el.textContent='';
  const cur = document.createElement('span');
  cur.className='cursor';
  el.appendChild(cur);
  let i=0;
  function tick(){
    if(i<text.length){
      el.insertBefore(document.createTextNode(text[i]),cur);
      i++;
      setTimeout(tick, i<4?120:55);
    } else {
      cur.remove();
      if(cb) cb();
    }
  }
  tick();
}

// ─────────────────────────────────────────────
// ADD LINE TO TEXT BLOCK
// ─────────────────────────────────────────────
function addLine(text, styleClasses, tw, cb){
  const span = document.createElement('span');
  span.className = 'line ' + (styleClasses||'');
  textBlock.appendChild(span);

  requestAnimationFrame(()=>{
    if(tw){
      span.classList.add('visible');
      typewrite(span, text, cb);
    } else {
      span.textContent = text;
      requestAnimationFrame(()=>{
        span.classList.add('visible');
        if(cb) setTimeout(cb,50);
      });
    }
  });
  return span;
}

// ─────────────────────────────────────────────
// CLEAR TEXT BLOCK
// ─────────────────────────────────────────────
function clearBlock(cb){
  const lines = textBlock.querySelectorAll('.line');
  lines.forEach(l=>{ l.classList.remove('visible'); l.classList.add('dim'); });
  setTimeout(()=>{
    textBlock.innerHTML='';
    if(cb) cb();
  }, 320);
}

// ─────────────────────────────────────────────
// SHAKE existing lines
// ─────────────────────────────────────────────
function shakeLines(){
  textBlock.querySelectorAll('.line').forEach(l=>{
    l.classList.remove('shaking');
    void l.offsetWidth;
    l.classList.add('shaking');
  });
}

// ─────────────────────────────────────────────
// PLAY BEAT
// ─────────────────────────────────────────────
function playBeat(b){
  busy = true;
  hideHint();

  // Update progress label
  if(b.label) progressLabel.textContent = b.label;

  // Approx progress %
  const pct = Math.round((beatIndex / beats.length)*100);
  progressFill.style.width = pct+'%';

  // CHOICE
  if(b.choice){
    choiceScreen.classList.add('show');
    busy = false;
    return;
  }

  // SOLUTION
  if(b.solution){
    launchSolution();
    return;
  }

  // BLANK pause before content
  const doReveal = ()=>{
    if(b.clear && !b.append){
      clearBlock(()=> renderBeat(b));
    } else {
      renderBeat(b);
    }
  };

  if(b.blank){
    blankOverlay.classList.add('on');
    setTimeout(()=>{
      // clear while blank
      textBlock.innerHTML='';
      setTimeout(()=>{
        blankOverlay.classList.remove('on');
        doReveal();
      }, b.blank);
    },300);
  } else if(b.clear && !b.append){
    clearBlock(()=> renderBeat(b));
  } else {
    renderBeat(b);
  }
}

function renderBeat(b){
  if(b.shake) shakeLines();

  const done = ()=>{
    busy = false;
    if(b.showHint) showHint();
    if(b.delay && !b.showHint){
      setTimeout(advance,b.delay);
    }
  };

  addLine(b.text, b.style, b.typewrite, done);
}

// ─────────────────────────────────────────────
// ADVANCE
// ─────────────────────────────────────────────
function advance(){
  if(busy || inChoice || inSolution) return;
  beatIndex++;
  if(beatIndex >= beats.length) return;
  playBeat(beats[beatIndex]);
}

// ─────────────────────────────────────────────
// CHOICE
// ─────────────────────────────────────────────
function makeChoice(btn){
  addRipple(btn, {clientX: btn.getBoundingClientRect().left+60, clientY: btn.getBoundingClientRect().top+20});
  btn.style.background='rgba(201,168,76,0.18)';
  btn.style.borderColor='var(--gold)';
  setTimeout(()=>{
    choiceScreen.classList.remove('show');
    advance();
  },700);
}

// ─────────────────────────────────────────────
// SOLUTION SCREEN — sequential reveal
// ─────────────────────────────────────────────
const solBeats = [
  // brand reveal
  { type:'line', cls:'sol-line brand', text:'Introducing...' },
  { type:'line', cls:'sol-line large gold', text:'The Trust Gap Protocol.' },
  { type:'divider' },
  { type:'line', cls:'sol-line dim', text:'This is not another copywriting service.' },
  { type:'line', cls:'sol-line dim', text:'Or another funnel review.' },
  { type:'line', cls:'sol-line', text:'It\'s a systematic audit that identifies exactly where skeptical buyers stop trusting your message...' },
  { type:'line', cls:'sol-line gold italic', text:'...and a messaging rebuild designed to close those gaps.' },
  { type:'hint' },

  { type:'line', cls:'sol-line brand', text:'Inside the audit, you\'ll discover:' },
  { type:'checks', items:[
    'Where trust begins leaking.',
    'Which objections your copy never answers.',
    'Which emotional stage your buyers are actually in.',
    'Which messages belong on each touchpoint.',
    'What to remove. What to amplify.',
    'What finally gives hesitant buyers permission to act.'
  ]},
  { type:'hint' },

  { type:'line', cls:'sol-line', text:'Because when your messaging meets people where they actually are...' },
  { type:'results', items:[
    'Conversions stop feeling random.',
    'Sales conversations get shorter.',
    'Price resistance drops.',
    'Trust compounds.',
    'And your marketing starts working <em>with</em> human psychology — instead of against it.'
  ]},
  { type:'hint' },

  { type:'cta' }
];

let solIdx = 0;
let solBusy = false;

function launchSolution(){
  inSolution = true;
  clickArea.style.display='none';
  solutionScreen.classList.add('show','gold-bg');
  progressLabel.textContent = 'The protocol. 100%';
  progressFill.style.width='100%';
  progressLabel.classList.add('lit');
  solIdx = 0;
  showSolBeat();
}

function showSolBeat(){
  if(solIdx >= solBeats.length) return;
  const b = solBeats[solIdx];
  solBusy = true;
  hideHint();

  if(b.type==='line'){
    const el = document.createElement('div');
    el.className = b.cls;
    el.innerHTML = b.text;
    solInner.appendChild(el);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ el.classList.add('vis'); solBusy=false; }); });

  } else if(b.type==='divider'){
    const d = document.createElement('div');
    d.className='sol-divider';
    solInner.appendChild(d);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ d.classList.add('vis'); solBusy=false; }); });

  } else if(b.type==='hint'){
    solBusy=false;
    showHint();
    return;

  } else if(b.type==='checks'){
    const ul = document.createElement('ul');
    ul.className='check-list';
    b.items.forEach((item,i)=>{
      const li = document.createElement('li');
      li.style.transitionDelay=(i*0.1)+'s';
      li.innerHTML=`<span class="check-mark">✓</span>${item}`;
      ul.appendChild(li);
    });
    solInner.appendChild(ul);
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      ul.querySelectorAll('li').forEach(li=>li.classList.add('vis'));
      solBusy=false;
    });});

  } else if(b.type==='results'){
    const ul = document.createElement('ul');
    ul.className='result-list';
    b.items.forEach((item,i)=>{
      const li = document.createElement('li');
      li.style.transitionDelay=(i*0.12)+'s';
      li.innerHTML=item;
      ul.appendChild(li);
    });
    solInner.appendChild(ul);
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      ul.querySelectorAll('li').forEach(li=>li.classList.add('vis'));
      solBusy=false;
    });});

  } else if(b.type==='cta'){
    const block = document.createElement('div');
    block.className='cta-block';
    block.innerHTML=`
      <p class="cta-copy">
        You don't need more traffic.<br>
        You don't need another redesign.<br>
        You don't even need a better offer.<br><br>
        <em>You need messaging that earns belief before it asks for action.</em>
      </p>
      <p class="cta-copy" style="font-size:clamp(0.88rem,2vw,1rem);margin-bottom:20px;color:var(--cream-dim);">
        If you'd like to discover where your buyers are quietly slipping away, start here.
        We'll identify where trust is breaking inside your customer journey and explore
        whether the Trust Gap Protocol is the right fit for your business.
      </p>
      <a href="#" class="cta-btn">Get Your Trust Gap Audit →</a>
    `;
    solInner.appendChild(block);
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{ block.classList.add('vis'); solBusy=false; });});
  }

  solIdx++;
  // if not a hint-stop, auto-continue after short pause
  if(b.type !== 'hint'){
    setTimeout(()=>{
      if(!solBusy) showSolBeat();
      else setTimeout(()=> showSolBeat(), 200);
    }, 380);
  }
}

function advanceSolution(){
  if(solBusy) return;
  showSolBeat();
}

// ─────────────────────────────────────────────
// CLICK HANDLING
// ─────────────────────────────────────────────
clickArea.addEventListener('click', e=>{
  if(inChoice) return;
  if(inSolution){ advanceSolution(); return; }
  if(busy) return;
  advance();
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(inChoice) return;
    if(inSolution){ advanceSolution(); return; }
    if(!busy) advance();
  }
});

let tsy=0;
document.addEventListener('touchstart',e=>{tsy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tsy - e.changedTouches[0].clientY > 40){
    if(inChoice) return;
    if(inSolution){ advanceSolution(); return; }
    if(!busy) advance();
  }
},{passive:true});

// ─────────────────────────────────────────────
// PARALLAX
// ─────────────────────────────────────────────
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-0.5)*10;
  const y=(e.clientY/window.innerHeight-0.5)*7;
  textBlock.style.transform=`translate(${x*0.25}px,${y*0.25}px)`;
});

// ─────────────────────────────────────────────
// KICK OFF
// ─────────────────────────────────────────────
playBeat(beats[0]);
</script>
</body>
</html>
